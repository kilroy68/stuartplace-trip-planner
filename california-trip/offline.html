<!doctype html>
<html lang="en">
<head>

<title>California Trip Offline</title>
<style>
:root{--bg:#f6f3ed;--panel:#fffaf2;--ink:#1d2a2e;--muted:#647073;--accent:#0f6c81;--line:#e4ded1}*{box-sizing:border-box}body{margin:0;min-height:100vh;display:grid;place-items:center;padding:24px;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Arial,sans-serif;color:var(--ink);background:linear-gradient(135deg,#fffaf2,#d9eef2)}main{max-width:560px;background:rgba(255,250,242,.94);border:1px solid var(--line);border-radius:24px;box-shadow:0 22px 70px rgba(16,32,36,.2);padding:28px}h1{margin:0 0 10px;font-size:30px;letter-spacing:-.04em}p{color:var(--muted);line-height:1.5}a{display:inline-flex;margin-top:10px;padding:11px 14px;border-radius:999px;background:var(--accent);color:#fff;text-decoration:none;font-weight:800}
</style>
</head>
<body>
<main>
  <h1>California Trip is offline</h1>
  <p>The planner needs a network connection for the authenticated map, reservations, notes, and photos. Reconnect to Wi‑Fi or cellular data, then reopen the app.</p>
  <a href="/california-trip/">Try again</a>
</main>
